<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pokédex</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <!-- Hidden because it is only visible at load and hides when all are loaded. -->
        <div id="loading-screen" hidden>
            <p id="loading-text">Loading Pokémon...
                <span id="loading-progress">0 / 0</span>
            </p>
        </div>

        <header id="topbar">
            <h1 id="app-title">Pokédex</h1>
            <input id="search-input" type="search">
            <button>&#128269;</button>
        </header>

        <aside id="filter-sidebar">

            <h2>Filter By:</h2>

            <h3>Type</h3>

            <h4 id="type-mode">Type Mode</h4>
            <label><input type="radio" name="type-mode" value="any">Any</label>
            <label><input type="radio" name="type-mode" value="single">Single only</label>
            <label><input type="radio" name="type-mode" value="dual">Dual only</label>

            <h4>Select Type(s)</h4>
            <label><input type="checkbox" value="normal">Normal</label>
            <label><input type="checkbox" value="grass">Grass</label>
            <label><input type="checkbox" value="fire">Fire</label>
            <label><input type="checkbox" value="water">Water</label>
            <label><input type="checkbox" value="electric">Electric</label>
            <label><input type="checkbox" value="psychic">Psychic</label>
            <label><input type="checkbox" value="fighting">Fighting</label>
            <label><input type="checkbox" value="dark">Dark</label>
            <label><input type="checkbox" value="steel">Steel</label>
            <label><input type="checkbox" value="dragon">Dragon</label>
            <label><input type="checkbox" value="fairy">Fairy</label>
            <label><input type="checkbox" value="ice">Ice</label>
            <label><input type="checkbox" value="ground">Ground</label>
            <label><input type="checkbox" value="rock">Rock</label>
            <label><input type="checkbox" value="bug">Bug</label>
            <label><input type="checkbox" value="ghost">Ghost</label>
            <label><input type="checkbox" value="flying">Flying</label>
            <label><input type="checkbox" value="poison">Poison</label>

            <h3>Generation</h3>
            <label><input type="checkbox" value="gen-i">Gen 1</label>
            <label><input type="checkbox" value="gen-ii">Gen 2</label>
            <label><input type="checkbox" value="gen-iii">Gen 3</label>
            <label><input type="checkbox" value="gen-iv">Gen 4</label>
            <label><input type="checkbox" value="gen-v">Gen 5</label>
            <label><input type="checkbox" value="gen-vi">Gen 6</label>
            <label><input type="checkbox" value="gen-vii">Gen 7</label>
            <label><input type="checkbox" value="gen-viii">Gen 8</label>
            <label><input type="checkbox" value="gen-ix">Gen 9</label>

            <h3>Special Category</h3>
            <label><input type="checkbox" value="legendary">Legendary</label>
            <label><input type="checkbox" value="mythical">Mythical</label>
            <label><input type="checkbox" value="baby">Baby</label>

            <button>Reset Filters</button>
        </aside>

        <main id="main-content">
            <span id="filter-chips">
                <button class="close-btn">x</button>
            </span>

            <!-- Generated by JS -->
            <p id="result-count"></p>

            <label for="sort-by">Sort by</label>
            <select id="sort-by">
                <option value="">-</option>
                <option value="id-asc">Number ↑</option>
                <option value="id-desc">Number ↓</option>
                <option value="name-asc">A-Z</option>
                <option value="name-desc">Z-A</option>
                <option value="height-asc">Smallest to biggest</option>
                <option value="height-desc">Biggest to smallest</option>
                <option value="weight-asc">Lightest to heaviest </option>
                <option value="weight-desc">Heaviest to lightest</option>
            </select>

            <section id="pokemon-grid">
                <!-- Cards generated by JS -->
            </section>

            <!-- Generated by JS -->
            <div id="scroll-sentinel"></div>
        </main>

        <div id="modal-container">
            <button class="close-btn">x</button>
            <button class="modal-nav-button" id="modal-nav-prev"></button>
            <button class="modal-nav-button" id="modal-nav-next"></button>
            <h2 id="modal-name"></h2>
            <p id="modal-number"></p>
            <img src="" alt="" id="modal-img">
            <p id="modal-type"></p>
            <p id="modal-height"></p>
            <p id="modal-weight"></p>
            <p id="modal-generation"></p>
            <p id="modal-special"></p>
        </div>


        <script src="main.js"></script>
    </body>

</html>
